name: Python CI (Ruff & Doctests)

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.14"

jobs:
  doctests_and_linter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt

      # TESTS
      - name: Execute tests with pytest module
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pip install pytest
          python -m pytest . --doctest-modules
          python -m pytest ./tests

      # LINTER
      - name: Ruff installieren
        run: pip install ruff

      - name: Ruff Check
        run: ruff check --output-format=github --target-version=py314 .

      - name: Ruff Format
        run: ruff format --output-format=github --diff --check --target-version=py314 .